<div class="login-page">

  <!-- Left Panel -->
  <aside class="login-left">
    <div class="brand">
      <img src="simpl-32.png" alt="Simpl logo" class="brand-icon">
      <span class="brand-name">Simpl</span>
    </div>
    <div class="brand-tagline">
      <p>Organize your work,<br><em>simply.</em></p>
    </div>
  </aside>

  <!-- Right Panel -->
  <main class="login-right">
    <div class="login-card">

      <div class="login-header">
        <h2>Welcome back</h2>
        <p>Sign in to continue</p>
      </div>

      <form class="login-form" (ngSubmit)="onSubmit()">
        <div class="field-group">
          <label class="field-label">Username</label>
          <input
            class="input-field"
            [(ngModel)]="username"
            name="username"
            placeholder="your username"
            autocomplete="username"
          />
        </div>

        <div class="field-group">
          <label class="field-label">Password</label>
          <input
            class="input-field"
            [(ngModel)]="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <button class="btn-submit" type="submit" [disabled]="isLoading">
          {{isLoading?'Signing in...':'Sign in →'}}
        </button>
      </form>
      @if (errorMessage) {
  <p class="error-message">{{ errorMessage }}</p>
}

 <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>
 
      <!-- Google OAuth Button -->
      <button type="button" class="btn-google" (click)="onGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9.003 18z" fill="#34A853"/>
          <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.003 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="login-footer">
        No account? <a class="link" routerLink="/register" (click)="router.navigate(['/register'])">Register</a>
      </p>

    </div>
  </main>


</div>
