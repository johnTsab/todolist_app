<div class="register-page">

  <!-- Left Panel -->
  <aside class="register-left">
    <div class="brand">
      <img src="simpl-32.png" alt="Simpl logo" class="brand-icon">
      <span class="brand-name">Simpl</span>
    </div>
    <div class="brand-tagline">
      <p>Start organizing<br><em>today.</em></p>
    </div>
  </aside>

  <!-- Right Panel -->
  <main class="register-right">
    <div class="mobile-header">
    <div class="brand">
      
      <img src="simpl-32.png" alt="Simpl logo" class="brand-icon">
      <span class="brand-name">simpl</span>
    </div>
    <p class="mobile-quote">Start organizing<br><em>today.</em></p>
  </div>

    <div class="register-card">

      <div class="register-header">
        <h2>Create account</h2>
        <p>Join TaskFlow and get started</p>
      </div>

      <form class="register-form" (ngSubmit)="onSubmit()">

        <div class="field-group">
          <label class="field-label">Username</label>
          <input
            class="input-field"
            [(ngModel)]="username"
            name="username"
            placeholder="choose a username"
            autocomplete="username"
          />
        </div>

        <label class="field-label">Email</label>
  <input
    class="input-field"
    [(ngModel)]="email"
    name="email"
    type="email"
    placeholder="your@email.com"
  />
        <div class="field-group">
          <label class="field-label">Password</label>
          <input
            class="input-field"
            [(ngModel)]="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        <div class="field-group">
          <label class="field-label">Confirm password</label>
          <input
            class="input-field"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        @if (errorMessage) {
          <p class="error-message">{{ errorMessage }}</p>
        }

        @if (successMessage) {
          <p class="success-message">{{ successMessage }}</p>
        }

        <button class="btn-submit" type="submit" [disabled]="isLoading">
          {{isLoading?'Redirecting...':'Create account →'}}</button>
      </form>

      <p class="register-footer">
        Already have an account? <a class="link" routerLink="/login" (click)="router.navigate(['/login'])">Sign in</a>
      </p>

    </div>
  </main>

</div>
